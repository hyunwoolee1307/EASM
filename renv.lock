    "terra": {
      "Package": "terra",
      "Version": "1.9-27",
      "Source": "Repository",
      "Type": "Package",
      "Title": "Spatial Data Analysis",
      "Date": "2026-05-09",
      "Depends": [
        "R (>= 3.5.0)",
        "methods"
      ],
      "Suggests": [
        "parallel",
        "tinytest",
        "ncdf4",
        "sf (>= 0.9-8)",
        "deldir",
        "XML",
        "leaflet (>= 2.2.1)",
        "htmlwidgets",
        "future",
        "future.apply"
      ],
      "LinkingTo": [
