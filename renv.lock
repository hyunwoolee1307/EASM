      "Authors@R": "c(person(given = \"Ron\", family = \"Wehrens\", role = c(\"aut\", \"cre\"), email = \"ron.wehrens@gmail.com\"), person(given = \"Johannes\", family = \"Kruisselbrink\", role = \"aut\"))",
